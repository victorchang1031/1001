databases:
  - name: album-db
    plan: free

services:
  - type: web
    name: practice-album-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TZ
        value: Asia/Taipei
      - key: DATABASE_URL
        fromDatabase:
          name: album-db
          property: connectionString
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: DISCOGS_TOKEN
        sync: false
